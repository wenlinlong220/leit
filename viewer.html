<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>笔记查看 - 雅思学习笔记</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
</head>
<body>
    <div class="container">
        <nav class="breadcrumb">
            <a href="index.html">🏠 首页</a> <span>/</span>
            <span id="pageTitle">笔记详情</span>
        </nav>

        <header class="header">
            <h1 id="noteTitle">📝 加载中...</h1>
        </header>

        <div class="content" id="markdownContent">
            <div class="placeholder">
                <div class="placeholder-icon">⏳</div>
                <p>加载笔记中...</p>
            </div>
        </div>
    </div>

    <script>
        let locateCounter = 0;
        let quizCounter = 0;
        const splitBlocks = [];
        const quizBlocks = [];

        // ===== 预处理 Markdown =====
        function preprocessMarkdown(md) {
            // ==高亮== 语法
            md = md.replace(/==(.*?)==/g, '<mark>$1</mark>');

            // :::quiz 自测题块 — 逐行解析，不依赖正则跨行匹配
            const mdLines = md.split('\n');
            const mdOut = [];
            let inQuiz = false;
            let quizLines = [];

            function buildQuizHtml(qLines) {
                let questionsHtml = '';
                let qIdx = 0;
                const blockId = 'quiz-block-' + quizCounter;
                qLines.forEach(function(line) {
                    line = line.trim();
                    if (!line) return;
                    if (line.startsWith('[fill]')) {
                        const parts = line.slice(6).split('|').map(function(s){ return s.trim(); });
                        const audioUrl = parts[0] || '';
                        const sentence = parts[1] || '';
                        const note = parts[2] || '';
                        qIdx++;
                        const qId = 'quiz-' + quizCounter + '-' + qIdx;
                        const sentenceHtml = sentence.replace(/\{\{([^}]+)\}\}/g, function(m, ans) {
                            const w = Math.max(ans.trim().length * 14, 80);
                            return '<input type="text" class="quiz-input" data-answer="' + ans.trim().toLowerCase() + '" style="width:' + w + 'px" placeholder="___" oninput="checkQuizInput(this)">';
                        });
                        questionsHtml += '<div class="quiz-item" id="' + qId + '" data-type="fill">' +
                            '<div class="quiz-item-header"><span class="quiz-num">Q' + qIdx + '</span><span class="quiz-type-tag">填空</span><button class="quiz-star-btn" onclick="toggleStar(\'' + qId + '\')" title="标记重点">☆</button></div>' +
                            '<div class="quiz-sentence">' + sentenceHtml + '</div>' +
                            (audioUrl ? '<div class="quiz-audio"><audio controls src="' + audioUrl + '"></audio></div>' : '') +
                            (note ? '<div class="quiz-note">💡 ' + note + '</div>' : '') +
                            '<div class="quiz-feedback" style="display:none;"></div></div>';
                    } else if (line.startsWith('[translate]')) {
                        const parts = line.slice(11).split('|').map(function(s){ return s.trim(); });
                        const chinese = parts[0] || '';
                        const answer = parts[1] || '';
                        const note = parts[2] || '';
                        qIdx++;
                        const qId = 'quiz-' + quizCounter + '-' + qIdx;
                        questionsHtml += '<div class="quiz-item" id="' + qId + '" data-type="translate">' +
                            '<div class="quiz-item-header"><span class="quiz-num">Q' + qIdx + '</span><span class="quiz-type-tag translate-tag">汉译英</span><button class="quiz-star-btn" onclick="toggleStar(\'' + qId + '\')" title="标记重点">☆</button></div>' +
                            '<div class="quiz-chinese">' + chinese + '</div>' +
                            '<textarea class="quiz-textarea" placeholder="请用英文填写..." rows="2" data-answer="' + answer.toLowerCase() + '"></textarea>' +
                            '<div class="quiz-actions"><button class="quiz-check-btn" onclick="checkTranslate(\'' + qId + '\')">✔ 核对答案</button><button class="quiz-show-btn" onclick="showAnswer(\'' + qId + '\', \'' + answer.replace(/'/g, "\\'") + '\')">👁 显示答案</button></div>' +
                            (note ? '<div class="quiz-note">💡 ' + note + '</div>' : '') +
                            '<div class="quiz-feedback" style="display:none;"></div></div>';
                    }
                });
                return '<div class="quiz-block" id="' + blockId + '">' +
                    '<div class="quiz-block-header"><span>📝 自测题</span><div class="quiz-block-actions">' +
                    '<button class="quiz-reset-btn" onclick="resetQuiz(\'' + blockId + '\')">🔄 重置</button>' +
                    '<button class="quiz-star-filter-btn" onclick="filterStarred(\'' + blockId + '\')" title="只显示重点题">⭐ 重点</button></div></div>' +
                    '<div class="quiz-items">' + questionsHtml + '</div></div>';
            }

            for (let i = 0; i < mdLines.length; i++) {
                const rawLine = mdLines[i];
                const trimmed = rawLine.trim();
                if (trimmed === ':::quiz') {
                    inQuiz = true;
                    quizLines = [];
                } else if (trimmed === ':::end-quiz') {
                    inQuiz = false;
                    const html = buildQuizHtml(quizLines);
                    const idx = quizBlocks.length;
                    quizBlocks.push(html);
                    quizCounter++;
                    mdOut.push('<div id="quiz-placeholder-' + idx + '"></div>');
                } else if (inQuiz) {
                    quizLines.push(rawLine);
                } else {
                    mdOut.push(rawLine);
                }
            }
            md = mdOut.join('\n');

            // :::exam-split 分栏布局
            md = md.replace(/:::exam-left\r?\n([\s\S]*?):::end-left[\r?\n\s]*:::exam-right\r?\n([\s\S]*?):::end-right/g, function(match, left, right) {
                let processedLeft = left.replace(/\[\[([\s\S]*?)\]\]/g, function(m, content) {
                    const inner = content.replace(/%%([^%]+?)%%/g, '<span class="replace-word">$1</span>');
                    return '<span class="locate-sentence">' + inner + '</span>';
                });
                processedLeft = processedLeft.replace(/%%([^%]+?)%%/g, '<span class="replace-word">$1</span>');
                
                const leftHtml = marked.parse(processedLeft);
                const rightHtml = marked.parse(right);

                const html = '<div class="exam-split-container">' +
                    '<div class="exam-panel exam-left">' +
                        '<div class="exam-panel-header">' +
                            '<span>📄 Reading Passage</span>' +
                            '<div class="exam-panel-controls">' +
                                '<button class="exam-ctrl-btn" onclick="toggleAllLocate(this)" title="显示/隐藏定位句高亮">📍 定位句</button>' +
                                '<button class="exam-ctrl-btn" onclick="toggleAllReplace(this)" title="显示/隐藏替换词高亮">🔍 替换词</button>' +
                            '</div>' +
                        '</div>' +
                        '<div class="exam-panel-body">' + leftHtml + '</div>' +
                    '</div>' +
                    '<div class="exam-panel exam-right">' +
                        '<div class="exam-panel-header"><span>📝 Questions & Analysis</span></div>' +
                        '<div class="exam-panel-body">' + rightHtml + '</div>' +
                    '</div>' +
                '</div>';
                
                const placeholder = '<!--EXAM_SPLIT_' + splitBlocks.length + '-->';
                splitBlocks.push(html);
                return placeholder;
            });

            // @@定位句@@ 语法
            md = md.replace(/@@([\s\S]*?)@@/g, function(match, content) {
                locateCounter++;
                const id = 'locate-' + locateCounter;
                const processedContent = content.replace(/%%([^%]+?)%%/g, 
                    '<span class="replace-word" data-group="' + id + '">$1</span>');
                return '<div class="locate-wrapper" id="' + id + '">' +
                    '<div class="locate-buttons">' +
                        '<button class="locate-toggle-btn" onclick="toggleLocate(\'' + id + '\')">' +
                            '<span class="btn-icon">📍</span> 显示定位句' +
                        '</button>' +
                        '<button class="replace-toggle-btn" onclick="toggleReplace(\'' + id + '\')" style="display:none;">' +
                            '<span class="btn-icon">🔍</span> 显示替换词' +
                        '</button>' +
                    '</div>' +
                    '<div class="locate-content" style="display:none;">' +
                        processedContent +
                    '</div>' +
                '</div>';
            });

            return md;
        }

        // ===== 自测题功能 =====

        // 实时检查填空题输入
        function checkQuizInput(input) {
            const answer = input.dataset.answer.trim().toLowerCase();
            const userVal = input.value.trim().toLowerCase();
            if (userVal === '') {
                input.className = 'quiz-input';
                return;
            }
            if (userVal === answer) {
                input.className = 'quiz-input correct';
            } else {
                input.className = 'quiz-input';
            }
            // 检查整题所有空是否都填对
            const item = input.closest('.quiz-item');
            const allInputs = item.querySelectorAll('.quiz-input');
            const allCorrect = Array.from(allInputs).every(inp => 
                inp.value.trim().toLowerCase() === inp.dataset.answer.trim().toLowerCase()
            );
            if (allCorrect && Array.from(allInputs).every(inp => inp.value.trim() !== '')) {
                item.classList.add('all-correct');
                const fb = item.querySelector('.quiz-feedback');
                fb.textContent = '✅ 全部正确！';
                fb.style.display = 'block';
                fb.className = 'quiz-feedback correct';
            } else {
                item.classList.remove('all-correct');
                const fb = item.querySelector('.quiz-feedback');
                fb.style.display = 'none';
            }
        }

        // 核对翻译题答案（模糊匹配）
        function checkTranslate(qId) {
            const item = document.getElementById(qId);
            const textarea = item.querySelector('.quiz-textarea');
            const answer = item.querySelector('.quiz-textarea').dataset.answer;
            const userVal = textarea.value.trim().toLowerCase();
            const fb = item.querySelector('.quiz-feedback');

            if (!userVal) {
                fb.textContent = '请先输入答案';
                fb.style.display = 'block';
                fb.className = 'quiz-feedback hint';
                return;
            }

            // 关键词匹配：提取答案中的关键词（忽略冠词、介词等虚词）
            const stopwords = new Set(['a','an','the','is','are','was','were','of','in','on','at','to','for','and','or','but','it','that','this','i','they','we','you','he','she','by','with','from','as','be','been','being','have','has','had','do','does','did','will','would','can','could','should','may','might']);
            const answerWords = answer.split(/\s+/).filter(w => w && !stopwords.has(w.replace(/[^a-z]/g, '')));
            const userWords = new Set(userVal.split(/\s+/).map(w => w.replace(/[^a-z]/g, '')));
            const matched = answerWords.filter(w => userWords.has(w.replace(/[^a-z]/g, '')));
            const score = Math.round(matched.length / answerWords.length * 100);

            if (score >= 80) {
                fb.innerHTML = '✅ 很好！关键词匹配 ' + score + '%<br><small>参考答案：' + item.querySelector('.quiz-textarea').dataset.answer + '</small>';
                fb.className = 'quiz-feedback correct';
            } else if (score >= 50) {
                fb.innerHTML = '🟡 接近！关键词匹配 ' + score + '%<br><small>参考答案：' + item.querySelector('.quiz-textarea').dataset.answer + '</small>';
                fb.className = 'quiz-feedback partial';
            } else {
                fb.innerHTML = '❌ 差距较大，关键词匹配 ' + score + '%<br><small>参考答案：' + item.querySelector('.quiz-textarea').dataset.answer + '</small>';
                fb.className = 'quiz-feedback wrong';
            }
            fb.style.display = 'block';
        }

        // 显示答案
        function showAnswer(qId, answer) {
            const item = document.getElementById(qId);
            const fb = item.querySelector('.quiz-feedback');
            fb.innerHTML = '👁 参考答案：<strong>' + answer + '</strong>';
            fb.style.display = 'block';
            fb.className = 'quiz-feedback hint';
        }

        // 星标切换
        function toggleStar(qId) {
            const item = document.getElementById(qId);
            const btn = item.querySelector('.quiz-star-btn');
            const key = 'star_' + qId + '_' + location.pathname;
            if (item.classList.contains('starred')) {
                item.classList.remove('starred');
                btn.textContent = '☆';
                localStorage.removeItem(key);
            } else {
                item.classList.add('starred');
                btn.textContent = '⭐';
                localStorage.setItem(key, '1');
            }
        }

        // 只显示重点题
        function filterStarred(blockId) {
            const block = document.getElementById(blockId);
            const btn = block.querySelector('.quiz-star-filter-btn');
            const items = block.querySelectorAll('.quiz-item');
            const isFiltered = btn.classList.contains('active');

            if (isFiltered) {
                items.forEach(item => item.style.display = '');
                btn.classList.remove('active');
                btn.textContent = '⭐ 重点';
            } else {
                items.forEach(item => {
                    item.style.display = item.classList.contains('starred') ? '' : 'none';
                });
                btn.classList.add('active');
                btn.textContent = '📋 全部';
            }
        }

        // 重置题目
        function resetQuiz(blockId) {
            const block = document.getElementById(blockId);
            block.querySelectorAll('.quiz-input').forEach(inp => {
                inp.value = '';
                inp.className = 'quiz-input';
            });
            block.querySelectorAll('.quiz-textarea').forEach(ta => {
                ta.value = '';
            });
            block.querySelectorAll('.quiz-feedback').forEach(fb => {
                fb.style.display = 'none';
                fb.textContent = '';
            });
            block.querySelectorAll('.quiz-item').forEach(item => {
                item.classList.remove('all-correct');
            });
        }

        // ===== 定位句 / 替换词功能 =====

        function toggleLocate(id) {
            const wrapper = document.getElementById(id);
            const content = wrapper.querySelector('.locate-content');
            const locateBtn = wrapper.querySelector('.locate-toggle-btn');
            const replaceBtn = wrapper.querySelector('.replace-toggle-btn');
            
            if (content.style.display === 'none') {
                content.style.display = 'block';
                locateBtn.innerHTML = '<span class="btn-icon">📍</span> 隐藏定位句';
                locateBtn.classList.add('active');
                replaceBtn.style.display = 'inline-flex';
            } else {
                content.style.display = 'none';
                locateBtn.innerHTML = '<span class="btn-icon">📍</span> 显示定位句';
                locateBtn.classList.remove('active');
                replaceBtn.style.display = 'none';
                const words = wrapper.querySelectorAll('.replace-word');
                words.forEach(w => w.classList.remove('revealed'));
                replaceBtn.innerHTML = '<span class="btn-icon">🔍</span> 显示替换词';
                replaceBtn.classList.remove('active');
            }
        }

        function toggleReplace(id) {
            const wrapper = document.getElementById(id);
            const replaceBtn = wrapper.querySelector('.replace-toggle-btn');
            const words = wrapper.querySelectorAll('.replace-word');
            
            const anyRevealed = wrapper.querySelector('.replace-word.revealed');
            if (anyRevealed) {
                words.forEach(w => w.classList.remove('revealed'));
                replaceBtn.innerHTML = '<span class="btn-icon">🔍</span> 显示替换词';
                replaceBtn.classList.remove('active');
            } else {
                words.forEach(w => w.classList.add('revealed'));
                replaceBtn.innerHTML = '<span class="btn-icon">🔍</span> 隐藏替换词';
                replaceBtn.classList.add('active');
            }
        }

        function toggleAllLocate(btn) {
            const container = btn.closest('.exam-split-container');
            const sentences = container.querySelectorAll('.locate-sentence');
            const isActive = btn.classList.contains('active');
            sentences.forEach(s => s.classList.toggle('highlighted', !isActive));
            btn.classList.toggle('active', !isActive);
        }

        function toggleAllReplace(btn) {
            const container = btn.closest('.exam-split-container');
            const words = container.querySelectorAll('.replace-word');
            const isActive = btn.classList.contains('active');
            words.forEach(w => w.classList.toggle('revealed', !isActive));
            btn.classList.toggle('active', !isActive);
        }

        // ===== 初始化 =====
        function init() {
            const params = new URLSearchParams(window.location.search);
            const file = params.get('file');
            const title = params.get('title') || '笔记详情';

            document.getElementById('noteTitle').textContent = '📝 ' + title;
            document.getElementById('pageTitle').textContent = title;
            document.title = title + ' - 雅思学习笔记';

            if (!file) {
                document.getElementById('markdownContent').innerHTML = `
                    <div class="placeholder">
                        <div class="placeholder-icon">❌</div>
                        <p>未指定笔记文件</p>
                    </div>`;
                return;
            }

            fetch(file)
                .then(r => {
                    if (!r.ok) throw new Error('文件不存在');
                    return r.text();
                })
                .then(md => {
                    locateCounter = 0;
                    quizCounter = 0;
                    splitBlocks.length = 0;
                    quizBlocks.length = 0;
                    const processed = preprocessMarkdown(md);
                    let html = marked.parse(processed);
                    splitBlocks.forEach((block, i) => {
                        html = html.replace('<!--EXAM_SPLIT_' + i + '-->', block);
                    });
                    document.getElementById('markdownContent').innerHTML = html;

                    // 用 DOM 替换 quiz 占位符（避免 marked 对字符串的干扰）
                    quizBlocks.forEach((block, i) => {
                        const placeholder = document.getElementById('quiz-placeholder-' + i);
                        if (placeholder) {
                            const tmp = document.createElement('div');
                            tmp.innerHTML = block;
                            placeholder.replaceWith(tmp.firstChild);
                        }
                    });

                    // 恢复星标状态
                    document.querySelectorAll('.quiz-item').forEach(item => {
                        const key = 'star_' + item.id + '_' + location.pathname;
                        if (localStorage.getItem(key)) {
                            item.classList.add('starred');
                            item.querySelector('.quiz-star-btn').textContent = '⭐';
                        }
                    });
                })
                .catch(err => {
                    document.getElementById('markdownContent').innerHTML = `
                        <div class="placeholder">
                            <div class="placeholder-icon">❌</div>
                            <p>加载失败: ${err.message}</p>
                            <p class="empty-tip">请确认文件 <code>${file}</code> 存在</p>
                        </div>`;
                });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
