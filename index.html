<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>听力笔记 - Markdown 播放器</title>
    <link rel="stylesheet" href="style.css">
    <!-- Marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>📝 听力笔记播放器</h1>
            <p class="subtitle">点击听句子 · 听老师解析 · 高效复习</p>
        </header>

        <!-- Controls -->
        <div class="controls">
            <div class="file-loader">
                <label for="mdFile" class="btn btn-primary">📂 导入 Markdown 笔记</label>
                <input type="file" id="mdFile" accept=".md,.txt,.markdown" style="display:none">
                <span class="file-name" id="fileName">未选择文件</span>
            </div>
        </div>

        <!-- Global Audio Player (floating) -->
        <div class="global-player" id="globalPlayer">
            <div class="player-info">
                <span class="player-label" id="playerLabel">准备就绪</span>
            </div>
            <div class="player-controls">
                <audio id="globalAudio" controls></audio>
            </div>
            <button class="btn-close-player" id="closePlayer" title="关闭播放器">✕</button>
        </div>

        <!-- Markdown Content -->
        <div class="content" id="markdownContent">
            <div class="placeholder">
                <div class="placeholder-icon">📄</div>
                <p>请导入你的 Markdown 笔记文件，或者直接在下方编辑区编写</p>
                <button class="btn btn-secondary" id="showEditor">✏️ 打开编辑器</button>
            </div>
        </div>

        <!-- Editor (hidden by default) -->
        <div class="editor-panel" id="editorPanel" style="display:none">
            <div class="editor-header">
                <h3>📝 编辑笔记</h3>
                <div class="editor-actions">
                    <button class="btn btn-success" id="renderBtn">▶ 渲染预览</button>
                    <button class="btn btn-secondary" id="hideEditor">✕ 关闭编辑器</button>
                </div>
            </div>
            <textarea id="mdEditor" placeholder="在这里粘贴或编写你的 Markdown 笔记...

支持的特殊语法：
1. [点击听](音频URL) - 点击直接播放句子
2. [老师解析](音频URL) - 播放老师的语音解析
3. ==高亮文字== - 标记重点词汇

示例：
- it does break but that's part of the fun
- [点击听](https://example.com/audio.mp3)
  *听混了*：fun和phone感觉很像
- [老师解析](https://example.com/teacher.mp3)
"></textarea>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
