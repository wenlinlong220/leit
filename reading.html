<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阅读笔记 - 雅思学习笔记</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <nav class="breadcrumb">
            <a href="index.html">🏠 首页</a> <span>/</span> <span>📖 阅读笔记</span>
        </nav>

        <header class="header">
            <h1>📖 阅读笔记</h1>
            <p class="subtitle">选择一篇阅读笔记开始复习</p>
        </header>

        <div class="note-list" id="readingList">
            <div class="placeholder">
                <p>加载中...</p>
            </div>
        </div>
    </div>

    <script src="notes-config.js"></script>
    <script>
        function renderReadingList() {
            const container = document.getElementById('readingList');
            const notes = NOTES_CONFIG.reading;

            if (notes.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <p>还没有阅读笔记</p>
                        <p class="empty-tip">在 <code>notes-config.js</code> 的 reading 数组中添加记录，<br>并将笔记文件放入 <code>note/</code> 文件夹</p>
                    </div>`;
                return;
            }

            const groups = {};
            notes.forEach(note => {
                const book = note.book || '未分类';
                if (!groups[book]) groups[book] = [];
                groups[book].push(note);
            });

            let html = '';
            for (const [book, items] of Object.entries(groups)) {
                html += `<div class="note-group">
                    <h3 class="group-title">📘 ${book}</h3>
                    <div class="group-items">`;
                items.forEach(note => {
                    html += `
                        <a href="viewer.html?file=${encodeURIComponent(note.file)}&title=${encodeURIComponent(note.title)}" class="note-item">
                            <div class="note-item-info">
                                <span class="note-item-title">${note.title}</span>
                                <span class="note-item-meta">${note.test || ''} · ${note.passage || ''}</span>
                            </div>
                            <div class="note-item-right">
                                <span class="note-item-date">${note.date || ''}</span>
                                <span class="note-item-arrow">→</span>
                            </div>
                        </a>`;
                });
                html += `</div></div>`;
            }
            container.innerHTML = html;
        }
        renderReadingList();
    </script>
</body>
</html>
